<div class="container-all">
  <app-header-view [isN3C]="true"></app-header-view>
  <app-n3c-menu [menuContent]="menu | async" [tenantContent]="tenant | async"></app-n3c-menu>

  <main>
    <div class="container-wide" id="about_container" [hidden]="dataLoading">
      <div class="pt-3 breadcrumb-container">
        <p><a [routerLink]="['/covid']">Home</a> > {{ pageContent?.header }}</p>
      </div>

      <app-n3c-loader [loading]="dataLoading" [showError]="showError">
        <div class="col-12 page-title">
          <h1>{{ pageContent?.header }}</h1>

          <div class="row-item mt-3 row">
            <div class="col-12 col-md-9 order-2 order-md-1">
              <h2 class="fs-2">{{ pageContent?.description?.header }}</h2>
              <div [innerHTML]="pageContent?.description?.content"></div>
            </div>
            <div class="col-12 col-md-3 order-1 order-md-2 text-center">
              <img class="img-fluid mb-3" [src]="pageContent?.description?.imageUrl" />
            </div>
          </div>

          <div class="row mb-4">
            <div class="col-12">
              <h2 class="fs-2">{{ pageContent?.header2 }}</h2>
              <div [innerHTML]="pageContent?.block1"></div>
            </div>
          </div>

          @for (rowItem of pageContent?.tool; track rowItem) {
            <div class="row mb-4">
              <div class="col-12 col-sm-3 col-md-2 mb-2 mb-md-0">
                <img class="img-fluid w-100" [src]="rowItem.images.thumbnail.url" />
              </div>
              <div class="col-12 col-sm-9 col-md-10">
                <h4 [innerHTML]="rowItem.header"></h4>
                <div [innerHTML]="rowItem.content"></div>
              </div>
            </div>
          }
        </div>
      </app-n3c-loader>
    </div>
  </main>

  <app-n3c-footer [tenantContent]="tenant | async"></app-n3c-footer>
</div>
