<div class="container-all">
  <app-header-view [isN3C]="true"></app-header-view>
  <app-n3c-menu [menuContent]="menu | async" [tenantContent]="tenant | async"></app-n3c-menu>

  <main>
    <div class="container-wide" id="main_container">
      <div class="pt-3">
        <p><a [routerLink]="['/covid']">Home</a> > {{ pageContent?.header }}</p>
      </div>

      <app-n3c-loader [loading]="dataLoading" [showError]="showError">
        <div class="row">
          <h1 [innerHTML]="pageContent?.header"></h1>
          <div class="row">
            <div class="col-12 col-md-3 my-3 my-md-0 order-1 order-md-2">
              <img [src]="pageContent?.images?.[0]" class="img-fluid" />
            </div>
            <div class="col-12 col-md-9 order-2 order-md-1">
              <h3 class="h3-subheader">{{ pageContent?.intro_block?.header }}</h3>
              <div [innerHTML]="pageContent?.intro_block?.content"></div>
              <div class="row mb-3">
                <a [href]="pageContent?.intro_block?.url">
                  <button class="btn btn-link">{{ pageContent?.intro_block?.url_label }}</button>
                </a>
              </div>
              <div class="row">
                <a href="https://national-covid-cohort-collaborative.github.io/guide-to-n3c-v1/">
                  <button class="btn btn-link">View The Researcher's Guide to N3C</button>
                </a>
              </div>
            </div>
          </div>

          <p></p>

          <div class="row flex-wrap">
            <h3 class="h3-subheader">{{ pageContent?.header2 }}</h3>
            <div class="row flex-wrap">
              <div [innerHTML]="pageContent?.faq_block1"></div>
              <mat-accordion class="accordion">
                @for (faq of pageContent?.faqs1; track faq) {
                  <mat-expansion-panel class="accordion-body">
                    <mat-expansion-panel-header>
                      <mat-panel-title>
                        {{ faq.label }}
                      </mat-panel-title>
                    </mat-expansion-panel-header>
                    <p [innerHTML]="faq.answer"></p>
                  </mat-expansion-panel>
                }
              </mat-accordion>
            </div>

            <p></p>

            <div class="row flex-wrap">
              <div [innerHTML]="pageContent?.faq_block2"></div>
              <mat-accordion class="accordion">
                @for (faq of pageContent?.faqs2; track faq) {
                  <mat-expansion-panel class="accordion-body">
                    <mat-expansion-panel-header>
                      <mat-panel-title>
                        {{ faq.label }}
                      </mat-panel-title>
                    </mat-expansion-panel-header>
                    <p [innerHTML]="faq.answer"></p>
                  </mat-expansion-panel>
                }
              </mat-accordion>
            </div>

            <p></p>

            <div class="row flex-wrap">
              <div [innerHTML]="pageContent?.block2"></div>
              <p></p>
              <div [innerHTML]="pageContent?.block3"></div>
            </div>
          </div>
        </div>
      </app-n3c-loader>
    </div>
  </main>

  <app-n3c-footer [tenantContent]="tenant | async"></app-n3c-footer>
</div>
