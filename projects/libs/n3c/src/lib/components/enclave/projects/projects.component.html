<div class="container-all">
  <app-header-view [isN3C]="true"></app-header-view>
  <app-n3c-menu [menuContent]="menu | async" [tenantContent]="tenant | async"></app-n3c-menu>

  <main>
    <div class="container-wide">
      <div class="pt-3">
        <p><a [routerLink]="['/covid']">Home </a> > {{ pageContent?.header }}</p>
      </div>

      <app-n3c-loader [loading]="dataLoading" [showError]="showError">
        <div class="col-12">
          <h1>{{ pageContent?.header }}</h1>
          <p>{{ pageContent?.block1 }}</p>
        </div>

        <div class="py-4">
          <div class="row">
            <div class="col-12">
              <div id="input-wrapper" class="mb-2">
                <i class="fa fa-search" id="search-icon"></i>
                <input
                  #searchInput
                  placeholder="TItle, Author, Institution..."
                  id="input-box"
                  class="my-2"
                  (input)="onFilterTextBoxChanged()"
                />
              </div>

              <div class="col-12 col-md-3" style="width: 100%">
                <ag-grid-angular
                  style="width: 100%; height: 100%"
                  class="no-side-borders"
                  [rowData]="rowData"
                  [columnDefs]="columnDefs"
                  [components]="frameworkComponents"
                  [defaultColDef]="defaultColDef"
                  [getRowStyle]="getRowStyle"
                  domLayout="autoHeight"
                  [headerHeight]="0"
                  [tooltipShowDelay]="800"
                  [pagination]="true"
                  [paginationPageSize]="paginationPageSize"
                  [paginationPageSizeSelector]="paginationPageSizeSelector"
                  (gridReady)="onGridReady($event)"
                >
                </ag-grid-angular>
              </div>
            </div>
          </div>
        </div>
      </app-n3c-loader>
    </div>
  </main>

  <app-n3c-footer [tenantContent]="tenant | async"></app-n3c-footer>
</div>
