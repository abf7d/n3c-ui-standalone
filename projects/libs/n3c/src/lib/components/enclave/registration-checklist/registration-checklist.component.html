<div class="container-all">
  <app-header-view [isN3C]="true"></app-header-view>
  <app-n3c-menu [menuContent]="menu | async" [tenantContent]="tenant | async"></app-n3c-menu>

  <main>
    <div class="container-wide" id="about_container" style="max-width: 88%">
      <div class="col-2 p-0 pt-3" style="width: 100%">
        <p><a [routerLink]="['/covid19/']">Home</a> > {{ pageContent?.Header }}</p>
      </div>

      <app-n3c-loader [loading]="dataLoading" [showError]="showError">
        <div>
          <h1 [innerHTML]="pageContent?.Header"></h1>
          <h2 class="center mt-4" [innerHTML]="pageContent?.Header2"></h2>
          <div class="center" [innerHTML]="pageContent?.Intro"></div>
          <div [innerHTML]="pageContent?.Checklist"></div>
        </div>
      </app-n3c-loader>
    </div>
  </main>

  <app-n3c-footer [tenantContent]="tenant | async"></app-n3c-footer>
</div>
