<div class="viz-header-section d-flex justify-content-between align-items-center">
  <h2 class="viz-title">{{ title }}</h2>
  <div class="btn-group css-dropdown">
    <button type="button" class="btn btn-sm btn-light dropdown-toggle" aria-haspopup="true" aria-expanded="false">
      <i class="fas fa-download"></i>
    </button>
    <div class="dropdown-menu dropdown-menu-right">
      <a class="dropdown-item" (click)="saveAs('jpg')">Save as JPG</a>
      <a class="dropdown-item" (click)="saveAs('png')">Save as PNG</a>
      <a class="dropdown-item" (click)="saveAs('svg')">Save as SVG</a>
    </div>
  </div>
</div>

<app-n3c-loader [loading]="loading" [showError]="error">
  <div #chartContainer class="chart-container" [hidden]="loading"></div>
</app-n3c-loader>
