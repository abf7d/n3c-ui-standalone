<app-n3c-mobile-menu></app-n3c-mobile-menu>
<div class="container-fluid p-0">
  <nav class="navbar navbar-expand-lg p-0" id="primary-nav">
    <div class="container-fluid align-items-center" id="n3c-container">
      <div class="d-flex align-items-center">
        <a class="n3c-image-link" routerLink="{{ mainLink }}">
          <img class="n3c-image" src="{{ mainLogoImage }}" />
        </a>

        <div *ngIf="this.tenantLogo && menuItems?.title.href !== mainLink" class="collapse navbar-collapse">
          <a class="n3c-image-link" id="n3c-page-image" routerLink="{{ menuItems?.title.href }}">
            <img class="n3c-image" src="{{ this.tenantLogo }}" />
          </a>
        </div>

        <a routerLink="{{ menuItems?.title.href }}" class="collapse navbar-collapse">
          <span class="n3c-title-link">{{ menuItems?.title.name }}</span>
        </a>
      </div>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav" id="navbarNavDropdown">
          <li
            [ngClass]="item?.customClass"
            *ngFor="let item of menuItems?.menu"
            routerLinkActive="active-link"
            [routerLinkActiveOptions]="{exact: true}"
          >
            <!--Single Item Menu without Dropdown-->
            <span *ngIf="!item.dropdown || item.dropdown === null">
              <span *ngIf="item.external === true; then hrefUrl; else routerLinkUrl"></span>
              <ng-template #routerLinkUrl>
                <a class="nav-link" routerLink="{{ item.href }}" [queryParams]="item.queryParams">{{ item.name }}</a>
              </ng-template>
              <ng-template #hrefUrl>
                <a class="nav-link" href="{{ item.href }}">{{ item.name }}</a>
              </ng-template>
            </span>

            <!--Menu Item with Dropdown-->
            <span
              *ngIf="item.dropdown"
              class="nav-item dropdown"
              routerLinkActive="active-link"
              [routerLinkActiveOptions]="{exact: true}"
            >
              <div class="d-inline-block css-dropdown">
                <a class="nav-link dropdown-toggle" id="aboutNavDropdown" aria-haspopup="true" aria-expanded="false">
                  {{ item.name }}
                </a>

                <!--DropDown Item Container-->
                <li class="dropdown-menu px-2 dropdown-submenu" aria-labelledby="SARSNavDropdown">
                  <span *ngFor="let subItem of item.dropdown">
                    <!--Sub Section-->
                    <div *ngIf="subItem.external === true; then hrefUrl; else routerLinkUrl"></div>
                    <ng-template #routerLinkUrl>
                      <a class="dropdown-item" [routerLink]="subItem.href" [queryParams]="subItem.queryParams">
                        <span class="subItemName">{{ subItem.name }}</span>
                      </a>
                    </ng-template>
                    <ng-template #hrefUrl>
                      <a class="dropdown-item" href="{{ subItem.href }}">
                        <span class="subItemName">{{ subItem.name }}</span>
                      </a>
                    </ng-template>
                  </span>
                </li>
              </div>
            </span>
          </li>
        </ul>
      </div>
      <button (click)="menuClick()" class="navbar-toggler" type="button" id="menu-toggle" data-toggle="collapse">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </nav>
</div>
