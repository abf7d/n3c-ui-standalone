server {
    listen 8000 default_server;
    server_tokens off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubdomains; preload";
    add_header X-Content-Type-Options nosniff;
    
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-SHA256:AES256-SHA256;
    root /var/www/app;
    server_name app;
    index index.html index.htm;
    

    location /variant/ {
        try_files $uri $uri/ /variant/index.html =404;
    }

    location /virus/ {
        try_files $uri $uri/ /virus/index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log error;
}